<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Eval Pipeline{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    {% block head %}{% endblock %}
  </head>
  <body class="bg-gray-950 text-gray-200 font-sans min-h-screen {% block body_class %}{% endblock %}">

    <header class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex items-center gap-4">
      {% block header_back %}{% endblock %}
      <h1 class="text-base font-semibold tracking-tight text-gray-100">{% block header_title %}Eval Pipeline{% endblock %}</h1>
      {% block header_actions %}{% endblock %}
      <div class="ml-auto">
        <a href="/" class="inline-flex items-center justify-center w-7 h-7 rounded text-gray-500 hover:text-gray-300 hover:bg-gray-800 transition-colors" title="Página inicial">
          <i data-lucide="home" class="w-4 h-4"></i>
        </a>
      </div>
    </header>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
  </body>
</html>
